<script>
const tg = window.Telegram?.WebApp;
if(tg){
tg.ready();
tg.expand();
setTimeout(()=>tg.expand(),150);
if (tg.requestFullscreen) {
    tg.requestFullscreen();
}

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const upload=document.getElementById("upload");
const fontsContainer=document.getElementById("fonts");
const modeBtn=document.getElementById("modeBtn");

let image=new Image();
image.crossOrigin="anonymous";

let mode="text";

let imgX=0,imgY=0,imgScale=1;
let textX=0,textY=0,textScale=1;

let selectedFont="Bebas Neue";
let selectedColor="white";

let isDragging=false;
let startX=0;
let startY=0;

const fonts=[
'Bebas Neue','Anton','Oswald','Rubik Mono One',
'Orbitron','Russo One','Exo 2','Teko',
'Montserrat','Rajdhani','Play'
];

fonts.forEach((font,i)=>{
const div=document.createElement("div");
div.className="design-item"+(i===0?" active":"");
div.style.fontFamily=font;
div.innerText="КОД PRIVET";
div.onclick=()=>{
document.querySelectorAll(".design-item")
.forEach(d=>d.classList.remove("active"));
div.classList.add("active");
selectedFont=font;
draw();
};
fontsContainer.appendChild(div);
});

upload.onchange=e=>{
const reader=new FileReader();
reader.onload=()=>{
image=new Image();
image.crossOrigin="anonymous";
image.onload=draw;
image.src=reader.result;
};
reader.readAsDataURL(e.target.files[0]);
};

modeBtn.onclick=()=>{
mode=mode==="text"?"photo":"text";
modeBtn.textContent=mode==="photo"?
"🔄 Редактировать текст":"✂ Редактировать фото";
};

canvas.addEventListener("wheel",e=>{
e.preventDefault();
const delta=e.deltaY*-0.001;

if(mode==="photo"){
imgScale=Math.min(Math.max(.1,imgScale+delta),5);
}else{
textScale=Math.min(Math.max(.5,textScale+delta),3);
}
draw();
});

/* ===== ДОБАВЛЕНО: ПЕРЕМЕЩЕНИЕ ===== */

canvas.addEventListener("pointerdown",e=>{
isDragging=true;
startX=e.clientX;
startY=e.clientY;
canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener("pointermove",e=>{
if(!isDragging) return;

const dx=e.clientX-startX;
const dy=e.clientY-startY;

startX=e.clientX;
startY=e.clientY;

if(mode==="photo"){
imgX+=dx;
imgY+=dy;
}else{
textX+=dx;
textY+=dy;
}

draw();
});

canvas.addEventListener("pointerup",()=>{
isDragging=false;
});

/* ===== КОНЕЦ ДОБАВЛЕННОГО ===== */

function setColor(c){
selectedColor=c;
draw();
}

function draw(){
ctx.clearRect(0,0,1000,1000);
ctx.fillStyle="#111";
ctx.fillRect(0,0,1000,1000);

if(image.src){
const w=image.width*imgScale;
const h=image.height*imgScale;
ctx.drawImage(image,500-w/2+imgX,500-h/2+imgY,w,h);
}

ctx.textAlign="center";
ctx.font="bold "+(100*textScale)+"px "+selectedFont;

ctx.fillStyle="white";
ctx.fillText("КОД",500+textX,450+textY);

ctx.fillStyle=selectedColor;
ctx.fillText("PRIVET",500+textX,550+textY);
}

async function uploadToCloudinary(){
const imageData=canvas.toDataURL("image/png");

const formData=new FormData();
formData.append("file",imageData);
formData.append("upload_preset","privet");

const response=await fetch(
"https://api.cloudinary.com/v1_1/ddku1jwj7/image/upload",
{method:"POST",body:formData}
);

const data=await response.json();

if(data.secure_url){
if(tg){
tg.openLink(data.secure_url);
}else{
window.open(data.secure_url,"_blank");
}
}
}

function downloadImage(){
uploadToCloudinary();
}

draw();
</script>
