<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PRIVET Avatar Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Oswald&family=Rubik+Mono+One&family=Orbitron:wght@700&family=Russo+One&family=Exo+2:wght@800&family=Teko:wght@700&family=Montserrat:wght@900&family=Rajdhani:wght@700&family=Play:wght@700&display=swap" rel="stylesheet">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
--bg1:#0b1220;
--bg2:#070d18;
--card:#121a2b;
--card2:#0f1726;
--accent:#2ea6d6;
--green1:#3bd14f;
--green2:#1fa532;
--text:#e8f1ff;
}

*{box-sizing:border-box}

html,body{
width:100%;
height:100%;
margin:0;
padding:0;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
font-family:Inter,Arial,sans-serif;
color:var(--text);
overflow:hidden;
}

.app{
height:100vh;
width:100vw;
padding:18px;
display:flex;
flex-direction:column;
}

.header{
text-align:left;
font-size:20px;
font-weight:600;
margin-bottom:15px;
opacity:.9;
}

.layout{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
overflow:hidden;
}

.card{
background:linear-gradient(180deg,var(--card),var(--card2));
border-radius:18px;
padding:18px;
display:flex;
flex-direction:column;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* PREVIEW */

.preview-box{
position:relative;
width:100%;
aspect-ratio:1/1;
background:#0a111c;
border-radius:16px;
overflow:hidden;
border:2px solid rgba(255,255,255,.05);
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* BUTTONS */

button{
padding:14px;
border-radius:12px;
background:#1a2436;
border:none;
color:white;
cursor:pointer;
margin-bottom:12px;
font-size:14px;
transition:.2s;
}

button:hover{
background:#243049;
}

button:last-of-type{
background:linear-gradient(180deg,var(--green1),var(--green2));
font-weight:600;
}

button:last-of-type:hover{
filter:brightness(1.1);
}

/* TITLES */

.section-title{
margin:18px 0 12px;
font-size:14px;
opacity:.6;
letter-spacing:.5px;
}

/* COLOR GRID */

.color-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.color-item{
background:#0e1626;
border-radius:14px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.2s;
border:2px solid transparent;
}

.color-item:hover{
border:2px solid var(--accent);
}

.color-dot{
width:18px;
height:18px;
border-radius:50%;
}

/* FONT GRID */

.design-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.design-item{
background:#0e1626;
padding:18px;
border-radius:16px;
text-align:center;
cursor:pointer;
border:2px solid transparent;
font-size:18px;
transition:.2s;
}

.design-item:hover{
border:2px solid var(--accent);
}

.design-item.active{
border:2px solid white;
box-shadow:0 0 15px rgba(255,255,255,.2);
}

/* MOBILE */

@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="app">
<div class="header">🎨 PRIVET Avatar Editor</div>

<div class="layout">

<div class="card">
<input type="file" id="upload" hidden>
<button onclick="upload.click()">📷 Загрузить фото</button>
<button id="modeBtn">✂ Редактировать фото</button>
<button onclick="downloadImage()">💾 Сохранить PNG</button>

<div class="preview-box">
<canvas id="canvas" width="1000" height="1000"></canvas>
<div class="instructions">
</div>
</div>
</div>

<div class="card">
<div class="section-title">Цвет текста</div>
<div class="color-grid">
<div class="color-item" onclick="setColor('white')"><div class="color-dot" style="background:white"></div>Белый</div>
<div class="color-item" onclick="setColor('red')"><div class="color-dot" style="background:red"></div>Красный</div>
<div class="color-item" onclick="setColor('blue')"><div class="color-dot" style="background:blue"></div>Синий</div>
<div class="color-item" onclick="setColor('green')"><div class="color-dot" style="background:green"></div>Зелёный</div>
<div class="color-item" onclick="setColor('gold')"><div class="color-dot" style="background:gold"></div>Жёлтый</div>
<div class="color-item" onclick="setColor('purple')"><div class="color-dot" style="background:purple"></div>Фиолетовый</div>
<div class="color-item" onclick="setColor('pink')"><div class="color-dot" style="background:pink"></div>Розовый</div>
<div class="color-item" onclick="setColor('orange')"><div class="color-dot" style="background:orange"></div>Оранжевый</div>
<div class="color-item" onclick="setColor('turquoise')"><div class="color-dot" style="background:turquoise"></div>Бирюзовый</div>   
<div class="color-item" onclick="setColor('black')"><div class="color-dot" style="background:black"></div>Чёрный</div>
</div>

<div class="section-title">Выбери шрифт</div>
<div class="info">
Управление наложением:<br>
• 1 палец - перемещение<br>
• 2 пальца - масштаб и поворот<br>
• Колесо мыши - масштаб (на ПК)
</div>
<div class="design-grid" id="fonts"></div>
</div>

</div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){
tg.ready();
tg.expand();
if (tg.requestFullscreen) tg.requestFullscreen();
setTimeout(()=>tg.expand(),150);
}

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const upload=document.getElementById("upload");
const fontsContainer=document.getElementById("fonts");
const modeBtn=document.getElementById("modeBtn");

let image=new Image();
image.crossOrigin="anonymous";

let mode="text";

let imgX=0,imgY=0,imgScale=1;
let textX=0,textY=0,textScale=1;

let selectedFont="Bebas Neue";
let selectedColor="white";

const fonts=[
'Bebas Neue','Anton','Oswald','Rubik Mono One',
'Orbitron','Russo One','Exo 2','Teko',
'Montserrat','Rajdhani','Play'
];

fonts.forEach((font,i)=>{
const div=document.createElement("div");
div.className="design-item"+(i===0?" active":"");
div.style.fontFamily=font;
div.innerText="КОД PRIVET";
div.onclick=()=>{
document.querySelectorAll(".design-item").forEach(d=>d.classList.remove("active"));
div.classList.add("active");
selectedFont=font;
draw();
};
fontsContainer.appendChild(div);
});

upload.onchange=e=>{
const reader=new FileReader();
reader.onload=()=>{
image=new Image();
image.crossOrigin="anonymous";
image.onload=draw;
image.src=reader.result;
};
reader.readAsDataURL(e.target.files[0]);
};

modeBtn.onclick=()=>{
mode=mode==="text"?"photo":"text";
modeBtn.textContent=mode==="photo"?
"🔄 Редактировать текст":"✂ Редактировать фото";
};

canvas.addEventListener("wheel",e=>{
e.preventDefault();
const delta=e.deltaY*-0.001;
if(mode==="photo"){
imgScale=Math.min(Math.max(.1,imgScale+delta),5);
}else{
textScale=Math.min(Math.max(.5,textScale+delta),3);
}
draw();
});

let isDragging=false;
let startX=0,startY=0;
let lastDistance=0;
let isScaling=false;

function getDistance(touches){
const dx = touches[0].clientX - touches[1].clientX;
const dy = touches[0].clientY - touches[1].clientY;
return Math.hypot(dx,dy);
}

canvas.addEventListener("mousedown", e=>{
isDragging=true;
startX=e.offsetX;
startY=e.offsetY;
});
canvas.addEventListener("mousemove", e=>{
if(!isDragging) return;
const dx=e.offsetX - startX;
const dy=e.offsetY - startY;
startX=e.offsetX;
startY=e.offsetY;
if(mode==="photo"){imgX+=dx; imgY+=dy;}
else{textX+=dx;textY+=dy;}
draw();
});
canvas.addEventListener("mouseup", ()=>isDragging=false);
canvas.addEventListener("mouseleave", ()=>isDragging=false);

canvas.addEventListener("touchstart", e=>{
if(e.touches.length==1){
isDragging=true;
const t=e.touches[0];
const rect=canvas.getBoundingClientRect();
startX=t.clientX-rect.left;
startY=t.clientY-rect.top;
}else if(e.touches.length==2){
isScaling=true;
lastDistance=getDistance(e.touches);
}
});

canvas.addEventListener("touchmove", e=>{
e.preventDefault();
const rect=canvas.getBoundingClientRect();
if(isDragging && e.touches.length==1){
const t=e.touches[0];
const dx=(t.clientX-rect.left)-startX;
const dy=(t.clientY-rect.top)-startY;
startX=t.clientX-rect.left;
startY=t.clientY-rect.top;
if(mode==="photo"){imgX+=dx; imgY+=dy;}
else{textX+=dx;textY+=dy;}
}else if(isScaling && e.touches.length==2){
const dist=getDistance(e.touches);
const delta=dist/lastDistance;
lastDistance=dist;
if(mode==="photo"){
imgScale=Math.min(Math.max(.1,imgScale*delta),5);
}else{
textScale=Math.min(Math.max(.5,textScale*delta),3);
}
}
draw();
},{passive:false});

canvas.addEventListener("touchend", e=>{
if(e.touches.length<2) isScaling=false;
if(e.touches.length==0) isDragging=false;
});

function setColor(c){
selectedColor=c;
draw();
}

function draw(){
ctx.clearRect(0,0,1000,1000);
ctx.fillStyle="#111";
ctx.fillRect(0,0,1000,1000);

if(image.src){
const w=image.width*imgScale;
const h=image.height*imgScale;
ctx.drawImage(image,500-w/2+imgX,500-h/2+imgY,w,h);
}

ctx.textAlign="center";

const fontSize = 100 * textScale;
ctx.font = "bold " + fontSize + "px " + selectedFont;

// свечение как во 2 html
ctx.shadowColor = selectedColor;
ctx.shadowBlur = 30;
ctx.shadowOffsetX = 0;
ctx.shadowOffsetY = 0;

// базовая точка центра
const centerX = 500 + textX;
const baseY = 550 + textY;

// верхняя строка
ctx.fillStyle = "white";
ctx.fillText("КОД", centerX, baseY - fontSize);

// нижняя строка
ctx.fillStyle = selectedColor;
ctx.fillText("PRIVET", centerX, baseY);

// сброс свечения
ctx.shadowBlur = 0;
ctx.shadowColor = "transparent";
}

async function uploadToCloudinary(){
const imageData=canvas.toDataURL("image/png");
const formData=new FormData();
formData.append("file",imageData);
formData.append("upload_preset","privet");
const response=await fetch(
"https://api.cloudinary.com/v1_1/ddku1jwj7/image/upload",
{method:"POST",body:formData}
);
const data=await response.json();
if(data.secure_url){
if(tg){tg.openLink(data.secure_url);}
else{window.open(data.secure_url,"_blank");}
}
}

function downloadImage(){uploadToCloudinary();}

draw();
</script>

</body>
</html>
