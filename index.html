<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>PRIVET Avatar Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Oswald&family=Rubik+Mono+One&family=Orbitron:wght@700&family=Russo+One&family=Exo+2:wght@800&family=Teko:wght@700&family=Montserrat:wght@900&family=Rajdhani:wght@700&family=Play:wght@700&display=swap" rel="stylesheet">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
--bg1:#0f1c2b;
--bg2:#07131f;
--card:#162536;
--accent:#2ea6d6;
--text:#e8f1ff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;width:100%;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text);overflow:hidden;touch-action:none;}
.app{height:100vh;width:100vw;padding:10px;display:flex;flex-direction:column;}
.header{text-align:center;font-size:26px;font-weight:600;margin-bottom:10px;}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:15px;flex:1;overflow:hidden;}
.card{background:var(--card);border-radius:14px;padding:15px;display:flex;flex-direction:column;min-height:0;overflow:auto;}
.preview-box{width:100%;height:100%;max-width:80vh;max-height:80vh;aspect-ratio:1/1;background:#222;border-radius:12px;overflow:hidden;margin:0 auto;display:flex;align-items:center;justify-content:center;touch-action:pinch-zoom pan-x pan-y;}
canvas{width:100%;height:100%;object-fit:contain;display:block;image-rendering:high-quality;}
button{padding:12px;border-radius:10px;background:var(--accent);border:none;color:white;cursor:pointer;margin-bottom:10px;}
.section-title{margin:15px 0 10px;opacity:.8;}
.color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.color-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:#0e1b2a;cursor:pointer;}
.color-dot{width:14px;height:14px;border-radius:50%;}
.design-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.design-item{background:#0b1624;padding:10px;border-radius:10px;text-align:center;cursor:pointer;border:2px solid transparent;}
.design-item.active{border:2px solid var(--accent);}

@media(max-width:900px){
.layout{grid-template-columns:1fr;grid-template-rows:auto 1fr;gap:10px;}
.preview-box{max-width:100%;max-height:45vh;}
.card{flex:1;min-height:0;}
}
</style>
</head>
<body>
<div class="app">
<div class="header">🎨 PRIVET Avatar Editor</div>
<div class="layout">
<div class="card">
<input type="file" id="upload" hidden>
<button onclick="upload.click()">📷 Загрузить фото</button>
<button id="editPhotoBtn">✂ Изменить обрезку</button>
<button onclick="downloadImage()">💾 Сохранить PNG</button>
<div class="preview-box">
<canvas id="canvas" width="1080" height="1080"></canvas>
</div>
</div>
<div class="card">
<div class="section-title">Цвет PRIVET</div>
<div class="color-grid">
<div class="color-item" onclick="setColor('white')"><div class="color-dot" style="background:white"></div>Белый</div>
<div class="color-item" onclick="setColor('red')"><div class="color-dot" style="background:red"></div>Красный</div>
<div class="color-item" onclick="setColor('blue')"><div class="color-dot" style="background:blue"></div>Синий</div>
<div class="color-item" onclick="setColor('green')"><div class="color-dot" style="background:green"></div>Зелёный</div>
<div class="color-item" onclick="setColor('yellow')"><div class="color-dot" style="background:gold"></div>Жёлтый</div>
<div class="color-item" onclick="setColor('purple')"><div class="color-dot" style="background:purple"></div>Фиолетовый</div>
</div>
<div class="section-title">Выбери шрифт</div>
<div class="design-grid" id="fonts"></div>
</div>
</div>
</div>

<script>
window.addEventListener("load", async () => {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.expand();
    if (tg.isVersionAtLeast?.("8.0")) {
      tg.requestFullscreen?.().catch(() => {});
    }
  }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  const upload = document.getElementById("upload");
  const fontsContainer = document.getElementById("fonts");
  const editPhotoBtn = document.getElementById("editPhotoBtn");

  let userImage = new Image();
  let mode = "text"; // "text" или "photo"
  let selectedColor = "white";
  let selectedFont = "Bebas Neue";
  let textX = 540;
  let textY = 1000;
  let textScale = 1;
  let imgX = 0;
  let imgY = 0;
  let imgScale = 1;

  const fonts = ['Bebas Neue','Anton','Oswald','Rubik Mono One','Orbitron','Russo One','Exo 2','Teko','Montserrat','Rajdhani','Play'];
  fonts.forEach((font,i)=>{
    const div = document.createElement("div");
    div.className = "design-item" + (i==0?" active":"");
    div.style.fontFamily = font;
    div.innerText = "КОД PRIVET";
    div.onclick = () => {
      document.querySelectorAll(".design-item").forEach(d=>d.classList.remove("active"));
      div.classList.add("active");
      selectedFont = font;
      drawCanvas();
    };
    fontsContainer.appendChild(div);
  });

  upload.onchange = e => {
    const reader = new FileReader();
    reader.onload = () => {
      userImage = new Image();
      userImage.onload = () => { centerImage(); drawCanvas(); };
      userImage.src = reader.result;
    };
    reader.readAsDataURL(e.target.files[0]);
  };

  function centerImage() {
    const cs = 1080;
    const scale = Math.min(cs / userImage.width, cs / userImage.height) * 0.9;
    imgScale = scale;
    imgX = (cs - userImage.width * scale) / 2;
    imgY = (cs - userImage.height * scale) / 2;
  }

  function setColor(color) {
    selectedColor = color;
    drawCanvas();
  }

  function drawCanvas() {
  ctx.clearRect(0, 0, 1080, 1080);
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, 1080, 1080);

  if (userImage.src) {
    ctx.drawImage(
      userImage,
      imgX,
      imgY,
      userImage.width * imgScale,
      userImage.height * imgScale
    );
  }

  ctx.save();               // сохраняем состояние перед текстом
  ctx.textAlign = "center";
  ctx.font = `bold ${120 * textScale}px ${selectedFont}`;
  ctx.shadowBlur = 30;

  // Сначала "КОД" — всегда белый
  ctx.fillStyle = "white";
  ctx.shadowColor = "white";
  ctx.fillText("КОД", textX, textY - 120 * textScale);

  // Теперь "PRIVET" — с выбранным цветом
  ctx.fillStyle = selectedColor;      // <-- здесь ключевой момент
  ctx.shadowColor = selectedColor;
  ctx.fillText("PRIVET", textX, textY);

  ctx.restore();            // восстанавливаем состояние после всего текста
}

  let isDragging = false, lastX=0, lastY=0;

  canvas.addEventListener("mousedown", e => { isDragging=true; lastX=e.offsetX; lastY=e.offsetY; });
  canvas.addEventListener("mousemove", e => {
    if (!isDragging) return;
    let dx = (e.offsetX - lastX) * (1080 / canvas.clientWidth);
    let dy = (e.offsetY - lastY) * (1080 / canvas.clientHeight);
    if (mode === "text") { textX += dx; textY += dy; }
    else if (mode === "photo") { imgX += dx; imgY += dy; }
    lastX = e.offsetX; lastY = e.offsetY;
    drawCanvas();
  });
  canvas.addEventListener("mouseup", () => isDragging = false);
  canvas.addEventListener("mouseleave", () => isDragging = false);

  canvas.addEventListener("wheel", e => {
    e.preventDefault();
    let sf = e.deltaY * -0.001;
    if (mode === "text") {
      textScale = Math.min(Math.max(0.5, textScale + sf), 3);
    } else if (mode === "photo") {
      imgScale = Math.min(Math.max(0.5, imgScale + sf), 5);
    }
    drawCanvas();
  });

  let touchStartDist = 0, touchStartScale = 1;
  canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      isDragging = true;
      lastX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
      lastY = e.touches[0].clientY - canvas.getBoundingClientRect().top;
    } else if (e.touches.length === 2) {
      let dx = e.touches[0].clientX - e.touches[1].clientX;
      let dy = e.touches[0].clientY - e.touches[1].clientY;
      touchStartDist = Math.sqrt(dx*dx + dy*dy);
      touchStartScale = (mode === "text") ? textScale : imgScale;
    }
  }, {passive: false});

  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      let ox = e.touches[0].clientX - canvas.getBoundingClientRect().left;
      let oy = e.touches[0].clientY - canvas.getBoundingClientRect().top;
      let dx = (ox - lastX) * (1080 / canvas.clientWidth);
      let dy = (oy - lastY) * (1080 / canvas.clientHeight);
      if (mode === "text") { textX += dx; textY += dy; }
      else if (mode === "photo") { imgX += dx; imgY += dy; }
      lastX = ox; lastY = oy;
      drawCanvas();
    } else if (e.touches.length === 2) {
      let dx = e.touches[0].clientX - e.touches[1].clientX;
      let dy = e.touches[0].clientY - e.touches[1].clientY;
      let dist = Math.sqrt(dx*dx + dy*dy);
      let sf = dist / touchStartDist;
      if (mode === "text") {
        textScale = Math.min(Math.max(0.5, touchStartScale * sf), 3);
      } else if (mode === "photo") {
        imgScale = Math.min(Math.max(0.5, touchStartScale * sf), 5);
      }
      drawCanvas();
    }
  }, {passive: false});

  canvas.addEventListener("touchend", e => { e.preventDefault(); isDragging = false; touchStartDist = 0; }, {passive: false});

  editPhotoBtn.onclick = () => {
    mode = mode === "photo" ? "text" : "photo";
    editPhotoBtn.textContent = mode === "photo" ? "🔄 Двигать фото" : "✂ Изменить обрезку";
  };

  function downloadImage() {
    const dataURL = canvas.toDataURL("image/png", 1.0);
    const tg = window.Telegram?.WebApp;

    if (tg && tg.downloadFile && tg.isVersionAtLeast?.("8.0")) {
      tg.downloadFile({ url: dataURL, file_name: "privet-avatar.png" });
    } else if (tg) {
      tg.openLink(dataURL);  // открывает фото → сохрани долгим нажатием
    } else {
      const a = document.createElement("a");
      a.href = dataURL;
      a.download = "privet-avatar.png";
      a.click();
    }
  }

  drawCanvas();
});
</script>
</body>
</html>
