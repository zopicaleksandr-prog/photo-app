<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>PRIVET Avatar Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Oswald&family=Rubik+Mono+One&family=Orbitron:wght@700&family=Russo+One&family=Exo+2:wght@800&family=Teko:wght@700&family=Montserrat:wght@900&family=Rajdhani:wght@700&family=Play:wght@700&display=swap" rel="stylesheet">

<!-- Официальный Telegram Web App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
--bg1:#0f1c2b;
--bg2:#07131f;
--card:#162536;
--accent:#2ea6d6;
--text:#e8f1ff;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
overflow:hidden;
}
.app{padding:15px;height:100vh;display:flex;flex-direction:column;}
.header{text-align:center;font-size:24px;margin-bottom:10px;}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:15px;flex:1;}
.card{background:var(--card);border-radius:14px;padding:15px;overflow:auto;}
.preview-box{width:100%;aspect-ratio:1/1;background:#222;border-radius:12px;overflow:hidden;}
canvas{width:100%;height:100%;display:block;}
button{padding:10px;border-radius:8px;background:var(--accent);border:none;color:white;cursor:pointer;margin-bottom:10px;width:100%;}
.section-title{margin:15px 0 10px;opacity:.8;}
.color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.color-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:#0e1b2a;cursor:pointer;}
.color-dot{width:14px;height:14px;border-radius:50%;}
.design-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.design-item{background:#0b1624;padding:10px;border-radius:10px;text-align:center;cursor:pointer;border:2px solid transparent;}
.design-item.active{border:2px solid var(--accent);}
@media(max-width:900px){.layout{grid-template-columns:1fr;}}
</style>
</head>

<body>
<div class="app">
<div class="header">🎨 PRIVET Avatar Editor</div>

<div class="layout">
<div class="card">
<input type="file" id="upload" hidden>
<button onclick="upload.click()">📷 Загрузить фото</button>
<button id="modeBtn">🔤 Редактировать текст</button>
<button onclick="downloadImage()">💾 Сохранить PNG</button>

<div class="preview-box">
<canvas id="canvas" width="1080" height="1080"></canvas>
</div>
</div>

<div class="card">
<div class="section-title">Цвет PRIVET</div>
<div class="color-grid">
<div class="color-item" onclick="setColor('white')"><div class="color-dot" style="background:white"></div>Белый</div>
<div class="color-item" onclick="setColor('red')"><div class="color-dot" style="background:red"></div>Красный</div>
<div class="color-item" onclick="setColor('blue')"><div class="color-dot" style="background:blue"></div>Синий</div>
<div class="color-item" onclick="setColor('green')"><div class="color-dot" style="background:green"></div>Зелёный</div>
<div class="color-item" onclick="setColor('gold')"><div class="color-dot" style="background:gold"></div>Жёлтый</div>
<div class="color-item" onclick="setColor('purple')"><div class="color-dot" style="background:purple"></div>Фиолетовый</div>
</div>

<div class="section-title">Выбери шрифт</div>
<div class="design-grid" id="fonts"></div>
</div>
</div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const upload=document.getElementById("upload");
const fontsContainer=document.getElementById("fonts");
const modeBtn=document.getElementById("modeBtn");

let userImage=new Image();
let selectedColor="white";
let selectedFont="Bebas Neue";

let mode="text";

let textX=540,textY=1000,textScale=1;
let imgX=0,imgY=0,imgScale=1;

function drawCanvas(){
ctx.clearRect(0,0,1080,1080);
ctx.fillStyle="#111";
ctx.fillRect(0,0,1080,1080);

if(userImage.src){
ctx.drawImage(userImage,imgX,imgY,userImage.width*imgScale,userImage.height*imgScale);
}

ctx.textAlign="center";
ctx.font=`bold ${140*textScale}px ${selectedFont}`;
ctx.shadowBlur=40;

ctx.fillStyle="white";
ctx.shadowColor="white";
ctx.fillText("КОД",textX,textY-140*textScale);

ctx.fillStyle=selectedColor;
ctx.shadowColor=selectedColor;
ctx.fillText("PRIVET",textX,textY);
ctx.shadowBlur=0;
}

function setColor(c){selectedColor=c;drawCanvas();}
window.setColor=setColor;

upload.onchange=e=>{
const reader=new FileReader();
reader.onload=()=>{
userImage=new Image();
userImage.onload=()=>{
imgScale=Math.min(1080/userImage.width,1080/userImage.height);
imgX=(1080-userImage.width*imgScale)/2;
imgY=(1080-userImage.height*imgScale)/2;
drawCanvas();
};
userImage.src=reader.result;
};
reader.readAsDataURL(e.target.files[0]);
};

let dragging=false,lastX=0,lastY=0;

canvas.onmousedown=e=>{
dragging=true;
lastX=e.offsetX;
lastY=e.offsetY;
};
canvas.onmousemove=e=>{
if(!dragging)return;
let dx=(e.offsetX-lastX)*(1080/canvas.clientWidth);
let dy=(e.offsetY-lastY)*(1080/canvas.clientHeight);
if(mode==="text"){textX+=dx;textY+=dy;}
else{imgX+=dx;imgY+=dy;}
lastX=e.offsetX;lastY=e.offsetY;
drawCanvas();
};
canvas.onmouseup=()=>dragging=false;
canvas.onmouseleave=()=>dragging=false;

canvas.onwheel=e=>{
e.preventDefault();
let s=e.deltaY*-0.001;
if(mode==="text"){textScale=Math.min(Math.max(0.5,textScale+s),3);}
else{imgScale=Math.min(Math.max(0.2,imgScale+s),5);}
drawCanvas();
};

let startDist=0,startScale=1;
canvas.addEventListener("touchstart",e=>{
if(e.touches.length===1){
dragging=true;
const rect=canvas.getBoundingClientRect();
lastX=e.touches[0].clientX-rect.left;
lastY=e.touches[0].clientY-rect.top;
}
if(e.touches.length===2){
let dx=e.touches[0].clientX-e.touches[1].clientX;
let dy=e.touches[0].clientY-e.touches[1].clientY;
startDist=Math.sqrt(dx*dx+dy*dy);
startScale=(mode==="text"?textScale:imgScale);
}
},{passive:false});

canvas.addEventListener("touchmove",e=>{
e.preventDefault();
if(e.touches.length===1&&dragging){
const rect=canvas.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;
let dx=(x-lastX)*(1080/canvas.clientWidth);
let dy=(y-lastY)*(1080/canvas.clientHeight);
if(mode==="text"){textX+=dx;textY+=dy;}
else{imgX+=dx;imgY+=dy;}
lastX=x;lastY=y;
drawCanvas();
}
if(e.touches.length===2){
let dx=e.touches[0].clientX-e.touches[1].clientX;
let dy=e.touches[0].clientY-e.touches[1].clientY;
let dist=Math.sqrt(dx*dx+dy*dy);
let factor=dist/startDist;
if(mode==="text"){textScale=Math.min(Math.max(0.5,startScale*factor),3);}
else{imgScale=Math.min(Math.max(0.2,startScale*factor),5);}
drawCanvas();
}
},{passive:false});

canvas.addEventListener("touchend",()=>{dragging=false;});

modeBtn.onclick=()=>{
mode=mode==="text"?"photo":"text";
modeBtn.textContent=mode==="text"?"🔤 Редактировать текст":"🖼 Редактировать фото";
};

function downloadImage(){
const link=document.createElement("a");
link.download="privet-avatar.png";
link.href=canvas.toDataURL("image/png");
link.click();
}
window.downloadImage=downloadImage;

const fonts=['Bebas Neue','Anton','Oswald','Rubik Mono One','Orbitron','Russo One','Exo 2','Teko','Montserrat','Rajdhani','Play'];

fonts.forEach((font,i)=>{
const div=document.createElement("div");
div.className="design-item"+(i===0?" active":"");
div.style.fontFamily=font;
div.innerText="КОД PRIVET";
div.onclick=()=>{
document.querySelectorAll(".design-item").forEach(d=>d.classList.remove("active"));
div.classList.add("active");
selectedFont=font;
drawCanvas();
};
fontsContainer.appendChild(div);
});

drawCanvas();
</script>

</body>
</html>
