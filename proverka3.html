<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STKILL Avatar Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Oswald&family=Rubik+Mono+One&family=Orbitron:wght@700&family=Russo+One&family=Exo+2:wght@800&family=Teko:wght@700&family=Montserrat:wght@900&family=Rajdhani:wght@700&family=Play:wght@700&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f1c2b;
    --bg2:#07131f;
    --card:#162536;
    --accent:#2ea6d6;
    --text:#e8f1ff;
}

*{box-sizing:border-box}

html,body{
    margin:0;
    height:100%;
    font-family:Inter,Arial,sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    color:var(--text);
    overflow:hidden;
}

.app{
    height:100vh;
    width:100vw;
    padding:20px;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    height:calc(100% - 40px);
}

.card{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    display:flex;
    flex-direction:column;
    overflow:auto;
}

.preview-box{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:#111;
    border-radius:12px;
    overflow:hidden;
    touch-action:none;
}

.preview-box img{
    position:absolute;
    top:0;
    left:0;
    transform-origin:center;
    user-select:none;
    pointer-events:none;
}

#overlayText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:white;
    font-family:'Bebas Neue';
    text-shadow:0 0 15px rgba(255,255,255,0.8);
    cursor:grab;
    touch-action:none;
}

.upload-btn, .edit-btn{
    padding:12px;
    border-radius:10px;
    background:var(--accent);
    border:none;
    color:white;
    cursor:pointer;
    margin-bottom:10px;
}

.section-title{
    margin:15px 0 10px;
    opacity:.8;
}

.color-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.color-item{
    padding:8px;
    border-radius:8px;
    background:#0e1b2a;
    cursor:pointer;
    text-align:center;
}

.design-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.design-item{
    background:#0b1624;
    padding:10px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    border:2px solid transparent;
}

.design-item.active{
    border:2px solid var(--accent);
}

@media(max-width:900px){
    .layout{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="app">
<div class="layout">

<!-- LEFT -->
<div class="card">

<input type="file" id="upload" hidden>
<button class="upload-btn" onclick="upload.click()">📷 Загрузить фото</button>
<button class="edit-btn" id="editBtn">✂ Изменить обрезку</button>

<div class="preview-box" id="preview">
    <img id="photo">
    <div id="overlayText">STKILL</div>
</div>

</div>

<!-- RIGHT -->
<div class="card">

<div class="section-title">Цвет текста</div>
<div class="color-grid">
<div class="color-item" onclick="setColor('white')">Белый</div>
<div class="color-item" onclick="setColor('red')">Красный</div>
<div class="color-item" onclick="setColor('blue')">Синий</div>
<div class="color-item" onclick="setColor('green')">Зелёный</div>
<div class="color-item" onclick="setColor('yellow')">Жёлтый</div>
<div class="color-item" onclick="setColor('purple')">Фиолетовый</div>
</div>

<div class="section-title">Выбери шрифт</div>

<div class="design-grid" id="fonts">
<div class="design-item active" data-font="'Bebas Neue'" style="font-family:'Bebas Neue'">STKILL</div>
<div class="design-item" data-font="'Anton'" style="font-family:'Anton'">STKILL</div>
<div class="design-item" data-font="'Oswald'" style="font-family:'Oswald'">STKILL</div>
<div class="design-item" data-font="'Rubik Mono One'" style="font-family:'Rubik Mono One'">STKILL</div>
<div class="design-item" data-font="'Orbitron'" style="font-family:'Orbitron'">STKILL</div>
<div class="design-item" data-font="'Russo One'" style="font-family:'Russo One'">STKILL</div>
<div class="design-item" data-font="'Exo 2'" style="font-family:'Exo 2'">STKILL</div>
<div class="design-item" data-font="'Teko'" style="font-family:'Teko'">STKILL</div>
<div class="design-item" data-font="'Montserrat'" style="font-family:'Montserrat'">STKILL</div>
<div class="design-item" data-font="'Rajdhani'" style="font-family:'Rajdhani'">STKILL</div>
<div class="design-item" data-font="'Play'" style="font-family:'Play'">STKILL</div>
</div>

</div>
</div>
</div>

<script>
const photo = document.getElementById("photo");
const upload = document.getElementById("upload");
const preview = document.getElementById("preview");
const text = document.getElementById("overlayText");
const editBtn = document.getElementById("editBtn");

let imgScale=1,imgX=0,imgY=0;
let txtScale=1,txtRotate=0,txtX=0,txtY=0;
let editing=false;

/* Загрузка фото */
upload.onchange = e=>{
    const reader=new FileReader();
    reader.onload=()=>photo.src=reader.result;
    reader.readAsDataURL(e.target.files[0]);
};

/* Цвет */
function setColor(color){
    text.style.color=color;
    text.style.textShadow=`0 0 20px ${color}`;
}

/* Шрифты */
document.querySelectorAll(".design-item").forEach(item=>{
    item.onclick=()=>{
        document.querySelectorAll(".design-item").forEach(i=>i.classList.remove("active"));
        item.classList.add("active");
        text.style.fontFamily=item.dataset.font;
    }
});

/* Включение режима редактирования */
editBtn.onclick=()=>editing=!editing;

/* Перетаскивание фото */
let startX,startY;

preview.addEventListener("pointerdown",e=>{
    if(!editing)return;
    startX=e.clientX;
    startY=e.clientY;
    preview.setPointerCapture(e.pointerId);
});

preview.addEventListener("pointermove",e=>{
    if(!editing||startX==null)return;
    imgX+=e.clientX-startX;
    imgY+=e.clientY-startY;
    startX=e.clientX;
    startY=e.clientY;
    photo.style.transform=`translate(${imgX}px,${imgY}px) scale(${imgScale})`;
});

preview.addEventListener("pointerup",()=>startX=null);

/* Масштаб фото колесом */
preview.addEventListener("wheel",e=>{
    if(!editing)return;
    imgScale+=e.deltaY*-0.001;
    photo.style.transform=`translate(${imgX}px,${imgY}px) scale(${imgScale})`;
});

/* Текст drag */
text.addEventListener("pointerdown",e=>{
    startX=e.clientX;
    startY=e.clientY;
    text.setPointerCapture(e.pointerId);
});

text.addEventListener("pointermove",e=>{
    if(startX==null)return;
    txtX+=e.clientX-startX;
    txtY+=e.clientY-startY;
    startX=e.clientX;
    startY=e.clientY;
    text.style.transform=`translate(${txtX}px,${txtY}px) scale(${txtScale}) rotate(${txtRotate}deg)`;
});

text.addEventListener("pointerup",()=>startX=null);

/* Pinch zoom + rotate */
let initialDistance=null,initialAngle=null;

preview.addEventListener("touchmove",e=>{
    if(e.touches.length===2){
        e.preventDefault();
        const dx=e.touches[0].clientX-e.touches[1].clientX;
        const dy=e.touches[0].clientY-e.touches[1].clientY;
        const distance=Math.sqrt(dx*dx+dy*dy);
        const angle=Math.atan2(dy,dx)*180/Math.PI;

        if(!initialDistance){
            initialDistance=distance;
            initialAngle=angle;
        }

        txtScale*=distance/initialDistance;
        txtRotate+=angle-initialAngle;

        initialDistance=distance;
        initialAngle=angle;

        text.style.transform=`translate(${txtX}px,${txtY}px) scale(${txtScale}) rotate(${txtRotate}deg)`;
    }
});

preview.addEventListener("touchend",()=>{
    initialDistance=null;
    initialAngle=null;
});
</script>

</body>
</html>
