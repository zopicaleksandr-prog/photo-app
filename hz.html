<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVET Avatar Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Oswald&family=Rubik+Mono+One&family=Orbitron:wght@700&family=Russo+One&family=Exo+2:wght@800&family=Teko:wght@700&family=Montserrat:wght@900&family=Rajdhani:wght@700&family=Play:wght@700&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f1c2b;
    --bg2:#07131f;
    --card:#162536;
    --accent:#2ea6d6;
    --text:#e8f1ff;
}

*{box-sizing:border-box}

html,body{
    margin:0;
    height:100%;
    font-family:Inter,Arial,sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    color:var(--text);
    overflow:hidden;
}

.app{
    height:100vh;
    width:100vw;
    padding:20px;
}

.header{
    text-align:center;
    font-size:26px;
    font-weight:600;
    margin-bottom:15px;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    height:calc(100% - 60px);
}

.card{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    display:flex;
    flex-direction:column;
    overflow:auto;
}

.preview-box{
    width:100%;
    max-width:420px;
    aspect-ratio:1/1;
    background:#222;
    border-radius:12px;
    overflow:hidden;
    margin:0 auto;
    touch-action:none;
}

canvas{
    width:100%;
    height:100%;
}

button{
    padding:12px;
    border-radius:10px;
    background:var(--accent);
    border:none;
    color:white;
    cursor:pointer;
    margin-bottom:10px;
}

.section-title{
    margin:15px 0 10px;
    opacity:.8;
}

.color-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.color-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px;
    border-radius:8px;
    background:#0e1b2a;
    cursor:pointer;
}

.color-dot{
    width:14px;
    height:14px;
    border-radius:50%;
}

.design-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.design-item{
    background:#0b1624;
    padding:10px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    border:2px solid transparent;
}

.design-item.active{
    border:2px solid var(--accent);
}

.info{
    margin-top:15px;
    font-size:13px;
    opacity:.7;
}

@media(max-width:900px){
    .layout{
        grid-template-columns:1fr;
    }
}
</style>

</head>

<body>

<div class="app">

<div class="header">🎨 PRIVET Avatar Editor</div>

<div class="layout">

<div class="card">

<input type="file" id="upload" hidden>
<button onclick="upload.click()">📷 Загрузить фото</button>
<button id="editPhotoBtn">✂ Изменить обрезку</button>
<button onclick="downloadImage()">💾 Сохранить PNG</button>

<div class="preview-box">
<canvas id="canvas" width="1080" height="1080"></canvas>
</div>

</div>

<div class="card">

<div class="section-title">Цвет PRIVET</div>

<div class="color-grid">
<div class="color-item" onclick="setColor('white')"><div class="color-dot" style="background:white"></div>Белый</div>
<div class="color-item" onclick="setColor('red')"><div class="color-dot" style="background:red"></div>Красный</div>
<div class="color-item" onclick="setColor('blue')"><div class="color-dot" style="background:blue"></div>Синий</div>
<div class="color-item" onclick="setColor('green')"><div class="color-dot" style="background:green"></div>Зелёный</div>
<div class="color-item" onclick="setColor('yellow')"><div class="color-dot" style="background:gold"></div>Жёлтый</div>
<div class="color-item" onclick="setColor('purple')"><div class="color-dot" style="background:purple"></div>Фиолетовый</div>
</div>

<div class="section-title">Выбери шрифт</div>
<div class="design-grid" id="fonts"></div>

<div class="info">
Управление:<br>
• Перемещение — мышь / палец<br>
• Колесо — масштаб<br>
</div>

</div>
</div>
</div>

<script>

/* ===== TELEGRAM FULLSCREEN ===== */

let tg = window.Telegram?.WebApp;

if(tg){
    tg.expand();
}

/* ===== STATE ===== */

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const upload=document.getElementById("upload");
const fontsContainer=document.getElementById("fonts");
const editPhotoBtn=document.getElementById("editPhotoBtn");

let userImage=new Image();

let mode="text";

let selectedColor="white";
let selectedFont="Bebas Neue";

/* position state */
let textX=540;
let textY=1000;
let textScale=1;

let imgX=0;
let imgY=0;
let imgScale=1;

/* ===== FONTS ===== */

const fonts=[
'Bebas Neue','Anton','Oswald','Rubik Mono One','Orbitron',
'Russo One','Exo 2','Teko','Montserrat','Rajdhani','Play'
];

fonts.forEach((font,i)=>{
    const div=document.createElement("div");
    div.className="design-item"+(i==0?" active":"");
    div.style.fontFamily=font;
    div.innerText="КОД PRIVET";

    div.onclick=()=>{
        document.querySelectorAll(".design-item")
        .forEach(d=>d.classList.remove("active"));

        div.classList.add("active");
        selectedFont=font;
        drawCanvas();
    };

    fontsContainer.appendChild(div);
});

/* ===== UPLOAD PHOTO ===== */

upload.onchange=e=>{
    const reader=new FileReader();

    reader.onload=()=>{
        userImage=new Image();

        userImage.onload=()=>{
            centerImage();
            drawCanvas();
        };

        userImage.src=reader.result;
    };

    reader.readAsDataURL(e.target.files[0]);
};

/* ===== CENTER IMAGE ===== */

function centerImage(){

    const canvasSize=1080;

    const scale=Math.min(
        canvasSize/userImage.width,
        canvasSize/userImage.height
    ) * 0.9;

    imgScale=scale;

    imgX=(canvasSize-userImage.width*imgScale)/2;
    imgY=(canvasSize-userImage.height*imgScale)/2;
}

/* ===== COLOR ===== */

function setColor(color){
    selectedColor=color;
    drawCanvas();
}

/* ===== DRAW PIPELINE ===== */

function drawCanvas(){

    ctx.clearRect(0,0,1080,1080);

    ctx.fillStyle="#111";
    ctx.fillRect(0,0,1080,1080);

    if(userImage.src){
        ctx.drawImage(
            userImage,
            imgX,
            imgY,
            userImage.width*imgScale,
            userImage.height*imgScale
        );
    }

    ctx.save();

    ctx.textAlign="center";

    /* КОД — фиксированный цвет */
    ctx.font=`bold ${120*textScale}px ${selectedFont}`;
    ctx.fillStyle="white";
    ctx.shadowColor="white";
    ctx.shadowBlur=30;

    ctx.fillText("КОД",textX,textY-120*textScale);

    /* PRIVET — меняет цвет */
    ctx.fillStyle=selectedColor;
    ctx.shadowColor=selectedColor;

    ctx.fillText("PRIVET",textX,textY);

    ctx.restore();
}

/* ===== DRAG ===== */

let isDragging=false;
let lastX=0;
let lastY=0;

canvas.addEventListener("mousedown",e=>{
    isDragging=true;
    lastX=e.offsetX;
    lastY=e.offsetY;
});

canvas.addEventListener("mousemove",e=>{
    if(!isDragging) return;

    let dx=(e.offsetX-lastX)*(1080/canvas.clientWidth);
    let dy=(e.offsetY-lastY)*(1080/canvas.clientHeight);

    if(mode==="text"){
        textX+=dx;
        textY+=dy;
    }else{
        imgX+=dx;
        imgY+=dy;
    }

    lastX=e.offsetX;
    lastY=e.offsetY;

    drawCanvas();
});

canvas.addEventListener("mouseup",()=>isDragging=false);
canvas.addEventListener("mouseleave",()=>isDragging=false);

/* ===== SCALE ===== */

canvas.addEventListener("wheel",e=>{
    e.preventDefault();

    if(mode==="text"){
        textScale+=e.deltaY*-0.001;
        textScale=Math.min(Math.max(.5,textScale),3);
    }

    if(mode==="photo"){
        imgScale+=e.deltaY*-0.001;
        imgScale=Math.min(Math.max(.5,imgScale),5);
    }

    drawCanvas();
});

/* ===== TOUCH ===== */

canvas.addEventListener("touchmove",e=>{
    if(e.touches.length===2){

        let dx=e.touches[0].clientX-e.touches[1].clientX;
        let dy=e.touches[0].clientY-e.touches[1].clientY;

        let distance=Math.sqrt(dx*dx+dy*dy);

        if(!canvas.initialDistance){
            canvas.initialDistance=distance;
            canvas.initialScale=textScale;
        }else{
            let factor=distance/canvas.initialDistance;
            textScale=canvas.initialScale*factor;
            drawCanvas();
        }
    }
});

/* ===== EDIT MODE ===== */

editPhotoBtn.onclick=()=>{
    mode = mode==="photo" ? "text" : "photo";

    editPhotoBtn.textContent =
        mode==="photo" ? "🔄 Двигать фото" : "✂ Изменить обрезку";
};

/* ===== DOWNLOAD ===== */

function downloadImage(){
    const link=document.createElement("a");
    link.download="privet-avatar.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
}

drawCanvas();

</script>


</body>
</html>
